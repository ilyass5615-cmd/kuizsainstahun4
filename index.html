<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuiz Sains KSSR UASA Tahun 4</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const quizData = [
            // TEMA: MANUSIA
            {
                topic: "Manusia: Pernafasan & Perkumuhan",
                question: "Rajah menunjukkan sistem pernafasan manusia. Apakah organ R? / The diagram shows the human respiratory system. What is organ R?",
                options: ["Hidung / Nose", "Trakea / Trachea", "Peparu / Lungs", "Jantung / Heart"],
                answer: 2
            },
            {
                topic: "Manusia: Pernafasan & Perkumuhan",
                question: "Rajah menunjukkan satu organ perkumuhan (Ginjal/Kidney). Apakah bahan buangan bagi organ perkumuhan di atas? / What is the waste product for the excretory organ above?",
                options: ["Peluh / Sweat", "Tinja / Faeces", "Air kencing / Urine", "Karbon dioksida / Carbon dioxide"],
                answer: 2
            },
            {
                topic: "Manusia: Pernafasan & Perkumuhan",
                question: "Apakah yang dimaksudkan dengan perkumuhan? / What is meant by excretion?",
                options: [
                    "Proses penyingkiran tinja. / The process of removing faeces.",
                    "Proses gerak balas terhadap rangsangan. / The process of responding to stimuli.",
                    "Proses menyedut udara masuk ke dalam peparu. / The process of inhaling air.",
                    "Proses penyingkiran bahan buangan dari badan. / The process of removing waste products from the body."
                ],
                answer: 3
            },
            {
                topic: "Manusia: Pernafasan & Perkumuhan",
                question: "Rajah menunjukkan satu organ perkumuhan (Kulit/Skin). Apakah hasil perkumuhan organ ini? / What are the excretory products of this organ?",
                options: ["Tinja / Faeces", "Air kencing / Urine", "Peluh / Sweat", "Karbon dioksida / Carbon dioxide"],
                answer: 2
            },
            {
                topic: "Manusia: Gerak Balas & Tabiat",
                question: "Rajah menunjukkan poster penyalahgunaan dadah. Apakah kesan dadah ke atas manusia? / What is the effect of drugs on humans?",
                options: [
                    "Sukar berkomunikasi / Difficult to communicate",
                    "Menambah kecergasan / Increases fitness",
                    "Mengganggu gerak balas / Disrupt of response",
                    "Menyihatkan kesihatan / Improves health"
                ],
                answer: 2
            },
            {
                topic: "Manusia: Gerak Balas & Tabiat",
                question: "Rajah menunjukkan keadaan seorang lelaki semasa keluar dari sebuah kafe (mabuk). Apakah kesan jika dia memandu? / What will happen if he drives?",
                options: [
                    "Dia lebih berhati-hati / He will be more careful",
                    "Dia boleh menyebabkan kemalangan / He may cause an accident",
                    "Dia menjadi lebih fokus / He will be more focused",
                    "Dia akan menerima pujian / He will receive praise"
                ],
                answer: 1
            },
            {
                topic: "Manusia: Gerak Balas & Tabiat",
                question: "Sammy sedang menonton televisyen. Tiba-tiba, dia terdengar bunyi guruh yang sangat kuat. Apakah gerak balas Sammy? / What is Sammy's reaction after he heard the thunder?",
                options: [
                    "Menutup matanya dengan tangan / Closing his eyes",
                    "Menutup telinganya dengan tangan / Covering his ears",
                    "Menutup hidungnya dengan tangan / Covering his nose",
                    "Mengangkat kakinya ke atas kerusi / Lifting his legs"
                ],
                answer: 1
            },
            
            // TEMA: HAIWAN
            {
                topic: "Haiwan: Vertebrata & Invertebrata",
                question: "Rajah menunjukkan seekor haiwan vertebrata (Ular/Snake). Antara yang berikut, manakah betul menerangkan ciri khusus haiwan ini? / Which correctly describes a specific characteristic of this animal?",
                options: [
                    "Melahirkan anak / Give birth",
                    "Hidup di darat dan air / Lives on land and in water",
                    "Mempunyai bulu pelepah / Has feathers",
                    "Bernafas melalui peparu / Breathes through lungs"
                ],
                answer: 3
            },
            {
                topic: "Haiwan: Vertebrata & Invertebrata",
                question: "Rajah menunjukkan haiwan invertebrata (Ulat bercas/Caterpillar). Antara haiwan berikut, yang manakah boleh dikelaskan dalam kumpulan yang sama? / Which animal can be classified in the same group?",
                options: ["Rusa (Deer)", "Ikan (Fish)", "Ular (Snake)", "Rama-rama (Butterfly)"],
                answer: 3
            },
            {
                topic: "Haiwan: Organ Pernafasan",
                question: "Seekor belalang yang telah disapu dengan lapisan minyak di seluruh badannya diletakkan ke dalam balang berlubang. Apakah yang akan berlaku selepas satu jam? / A grasshopper coated with oil is placed in a jar with holes. What will happen after one hour?",
                options: ["Sudah mati / Already dead", "Masih hidup / Still alive", "Boleh terbang / Able to fly", "Boleh makan daun / Able to eat leaves"],
                answer: 0
            },
            {
                topic: "Haiwan: Vertebrata & Invertebrata",
                question: "Haiwan ini bernafas menggunakan peparu dan kulit lembap, bertelur dan hidup di darat dan air. Apakah kumpulan haiwan itu? / Breathes using lungs & moist skin, lay eggs, lives on land & water. What group?",
                options: ["Mamalia / Mammals", "Reptilia / Reptiles", "Amfibia / Amphibians", "Burung / Birds"],
                answer: 2
            },

            // TEMA: TUMBUH-TUMBUHAN
            {
                topic: "Tumbuh-tumbuhan: Fotosintesis & Gerak Balas",
                question: "Rajah menunjukkan pokok semalu disentuh. Antara tumbuhan berikut, yang manakah bergerak balas terhadap rangsangan yang sama? / Which plant reacts to the same stimuli as Mimosa pudica?",
                options: ["Pokok mawar / Rose plant", "Pokok kelapa / Coconut tree", "Pokok orkid / Orchid plant", "Pokok perangkap lalat Venus / Venus flytrap"],
                answer: 3
            },
            {
                topic: "Tumbuh-tumbuhan: Fotosintesis & Gerak Balas",
                question: "Puan Azie terlupa menyiram pokok bunga di tempat letak kereta berbumbung selama seminggu. Pokok telah layu. Apakah kaedah menyelamatkan pokok? / Forgot to water plants in covered car park for a week. How to save them?",
                options: [
                    "Menyiram pokok & Letak di ruang terbuka / Water and place in open area",
                    "Menyiram pokok & Mengalihkan ke dalam pasu besar / Water and transfer to larger pot",
                    "Letak di ruang terbuka & tertutup / Place in open & closed area",
                    "Letak di ruang tertutup & pasu besar / Place in closed area & larger pot"
                ],
                answer: 0
            },
            {
                topic: "Tumbuh-tumbuhan: Fotosintesis & Gerak Balas",
                question: "Tumbuhan diletakkan di dalam bilik (menjauhi tingkap). Apakah yang perlu dilakukan untuk membolehkan tumbuhan tumbuh tegak? / Plant placed in a room. What should be done to allow it to grow upright?",
                options: [
                    "Letak dalam kotak hitam / Place in a black box",
                    "Siram dengan kerap / Water regularly",
                    "Letak di luar rumah / Place outside the house",
                    "Buka tingkap itu / Open the window"
                ],
                answer: 3
            },

            // TEMA: SAINS FIZIKAL (Cahaya, Bunyi, Tenaga)
            {
                topic: "Sains Fizikal: Cahaya & Bunyi",
                question: "Rajah menunjukkan fenomena cahaya (cahaya matahari melalui celah pokok). Apakah sifat cahaya yang ditunjukkan? / What is the property of light shown?",
                options: [
                    "Cahaya boleh dibiaskan / Light can be refracted",
                    "Cahaya boleh dipantulkan / Light can be reflected",
                    "Cahaya bergerak dalam garis lurus / Light travels in a straight line",
                    "Cahaya boleh merambat dalam vakum / Light can propagate in a vacuum"
                ],
                answer: 2
            },
            {
                topic: "Sains Fizikal: Cahaya & Bunyi",
                question: "Rajah menunjukkan pembentukan pelangi selepas hujan. Apakah fenomena cahaya yang ditunjukkan? / What is the light phenomenon shown in the formation of a rainbow?",
                options: [
                    "Cahaya dibiaskan / Light is refracted",
                    "Cahaya dipantulkan / Light is reflected",
                    "Cahaya bergerak lurus / Light travels in a straight line",
                    "Cahaya bergerak semua arah / Light travels in all directions"
                ],
                answer: 0
            },
            {
                topic: "Sains Fizikal: Cahaya & Bunyi",
                question: "Rajah menunjukkan Jessie bermain gitar. Apakah cara menghasilkan bunyi gitar? / How does Jessie produce sound from the guitar?",
                options: ["Tiupan / Blowing", "Petikan / Plucking", "Ketukan / Knocking", "Tepukan / Clapping"],
                answer: 1
            },
            {
                topic: "Sains Fizikal: Tenaga",
                question: "Rajah menunjukkan Siti menggunakan dapur gas. Apakah perubahan bentuk tenaga yang terlibat? / What is the energy transformation involved?",
                options: [
                    "Tenaga haba -> Tenaga kimia / Heat to chemical",
                    "Tenaga kimia -> Tenaga haba / Chemical to heat",
                    "Tenaga cahaya -> Tenaga haba / Light to heat",
                    "Tenaga kinetik -> Tenaga kimia / Kinetic to chemical"
                ],
                answer: 1
            },

            // TEMA: BAHAN, BUMI & MESIN
            {
                topic: "Bahan, Bumi & Mesin",
                question: "Pak Cik Lee ingin membuat almari pakaian yang kukuh dan tahan lama. Bahan manakah yang sesuai? / Uncle Lee wants to build a sturdy wardrobe. Which material is suitable?",
                options: ["Besi / Iron", "Kayu / Wood", "Plastik / Plastic", "Tanah liat / Clay"],
                answer: 1
            },
            {
                topic: "Bahan, Bumi & Mesin",
                question: "Rajah menunjukkan daya yang mengekalkan objek pada kedudukannya di Bumi. Apakah daya ini? / The diagram shows a force that keeps objects in their positions on Earth. What force?",
                options: ["Daya kinetik / Kinetic force", "Daya tarikan / Pull force", "Daya tolakan / Push force", "Daya tarikan graviti / Gravitational pull"],
                answer: 3
            },
            {
                topic: "Bahan, Bumi & Mesin",
                question: "Rajah menunjukkan sebilah gunting. Apakah yang diwakili oleh P (pemegang), Q (skru tengah), dan R (mata pemotong)? / What is represented by P, Q and R?",
                options: [
                    "P: Beban, Q: Daya, R: Fulkrum",
                    "P: Fulkrum, Q: Daya, R: Beban",
                    "P: Daya, Q: Fulkrum, R: Beban",
                    "P: Beban, Q: Fulkrum, R: Daya"
                ],
                answer: 2
            }
        ];

        function App() {
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [showScore, setShowScore] = useState(false);
            const [selectedTopic, setSelectedTopic] = useState('Semua Topik');
            const [filteredQuiz, setFilteredQuiz] = useState(quizData);
            const [userAnswers, setUserAnswers] = useState([]);

            const topics = ['Semua Topik', ...new Set(quizData.map(q => q.topic))];

            useEffect(() => {
                if (selectedTopic === 'Semua Topik') {
                    setFilteredQuiz(quizData);
                } else {
                    setFilteredQuiz(quizData.filter(q => q.topic === selectedTopic));
                }
                setCurrentQuestion(0);
                setScore(0);
                setShowScore(false);
                setUserAnswers([]);
            }, [selectedTopic]);

            const handleAnswerOptionClick = (index) => {
                const isCorrect = index === filteredQuiz[currentQuestion].answer;
                if (isCorrect) setScore(score + 1);

                const newAnswers = [...userAnswers];
                newAnswers[currentQuestion] = { selected: index, isCorrect };
                setUserAnswers(newAnswers);

                const nextQuestion = currentQuestion + 1;
                if (nextQuestion < filteredQuiz.length) {
                    setCurrentQuestion(nextQuestion);
                } else {
                    setShowScore(true);
                }
            };

            const restartQuiz = () => {
                setCurrentQuestion(0);
                setScore(0);
                setShowScore(false);
                setUserAnswers([]);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex items-center justify-center">
                    <div className="max-w-3xl w-full glass-panel rounded-2xl shadow-xl overflow-hidden">
                        {/* Header */}
                        <div className="bg-blue-600 text-white p-6 text-center">
                            <h1 className="text-3xl font-bold mb-2"><i className="fas fa-flask mr-3"></i>Kuiz Sains Tahun 4 (UASA)</h1>
                            <p className="text-blue-100">Jawab semua soalan dengan teliti. / Answer all questions carefully.</p>
                        </div>

                        {/* Topic Selector (Only show if not finished) */}
                        {!showScore && (
                            <div className="bg-gray-100 p-4 border-b border-gray-200 flex justify-center items-center gap-4">
                                <label className="font-semibold text-gray-700">Pilih Topik / Select Topic:</label>
                                <select 
                                    className="p-2 rounded border border-gray-300 bg-white text-sm md:text-base outline-none focus:ring-2 focus:ring-blue-500"
                                    value={selectedTopic} 
                                    onChange={(e) => setSelectedTopic(e.target.value)}
                                >
                                    {topics.map((topic, idx) => (
                                        <option key={idx} value={topic}>{topic}</option>
                                    ))}
                                </select>
                            </div>
                        )}

                        <div className="p-6 md:p-8">
                            {showScore ? (
                                <div className="text-center animate-fade-in">
                                    <i className="fas fa-trophy text-6xl text-yellow-400 mb-4"></i>
                                    <h2 className="text-3xl font-bold text-gray-800 mb-2">Markah Anda / Your Score</h2>
                                    <p className="text-2xl font-semibold text-blue-600 mb-6">
                                        {score} / {filteredQuiz.length}
                                    </p>
                                    <div className="h-4 w-full bg-gray-200 rounded-full mb-8 overflow-hidden">
                                        <div 
                                            className="h-full bg-blue-500 transition-all duration-1000" 
                                            style={{width: `${(score/filteredQuiz.length)*100}%`}}>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={restartQuiz}
                                        className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full transition transform hover:scale-105"
                                    >
                                        <i className="fas fa-redo mr-2"></i> Cuba Lagi / Try Again
                                    </button>
                                </div>
                            ) : (
                                <div>
                                    <div className="mb-6 flex justify-between items-center text-sm font-semibold text-gray-500">
                                        <span className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full">{filteredQuiz[currentQuestion].topic}</span>
                                        <span>Soalan / Question {currentQuestion + 1} / {filteredQuiz.length}</span>
                                    </div>
                                    
                                    <div className="mb-8">
                                        <h2 className="text-xl md:text-2xl font-semibold text-gray-800 mb-6 leading-relaxed">
                                            {filteredQuiz[currentQuestion].question}
                                        </h2>
                                        <div className="space-y-3">
                                            {filteredQuiz[currentQuestion].options.map((option, index) => (
                                                <button
                                                    key={index}
                                                    onClick={() => handleAnswerOptionClick(index)}
                                                    className="w-full text-left p-4 rounded-xl border-2 border-gray-200 hover:border-blue-500 hover:bg-blue-50 transition duration-200 font-medium text-gray-700 flex items-center gap-3"
                                                >
                                                    <span className="bg-gray-100 text-gray-600 w-8 h-8 rounded-full flex items-center justify-center shrink-0">
                                                        {String.fromCharCode(65 + index)}
                                                    </span>
                                                    {option}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
